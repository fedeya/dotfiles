[[keyboard.bindings]]
chars = "\u000E"
key = "J"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0010"
key = "K"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0013"
key = "S"
mods = "Command"

[env]
TERM = "xterm-256color"

[font]
size = 18
normal = { family = "JetBrainsMono Nerd Font", style = "Medium" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

[general]
import = ["~/.config/alacritty/themes/rose_pine.toml"]

[window]
option_as_alt = "Both"
decorations = "buttonless"

[window.dimensions]
columns = 181
lines = 66


[window.padding]
x = 10
y = 10
